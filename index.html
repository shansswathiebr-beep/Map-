<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>OPERATION SPECTER | W3W Grid</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
        
        :root {
            --bg: #000000;
            --cyan: #00d4ff;
            --green: #00ff41;
            --gold: #ffd700;
            --red: #ff0040;
            --dim: #5a6b7b;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            color: white;
        }
        
        #map { 
            width: 100%; 
            height: 100%; 
            background: #020408; 
            z-index: 1; 
        }
        
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            opacity: 0.6;
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 100;
        }
        
        @keyframes scan {
            0% { transform: translateY(-10px); }
            100% { transform: translateY(100vh); }
        }
        
        .lang-bar {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.8);
            padding: 5px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .lang-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--dim);
            padding: 6px 10px;
            font-family: inherit;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .lang-btn.active { 
            border-color: var(--gold); 
            color: var(--gold); 
            background: rgba(255,215,0,0.1);
        }
        
        .status-dot {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green);
            z-index: 1000;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .sector-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0,0,0,0.95);
            border: 1px solid var(--green);
            padding: 20px;
            border-radius: 4px;
            min-width: 300px;
            max-width: 90vw;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 500;
            box-shadow: 0 0 40px rgba(0,255,65,0.2);
        }
        
        .sector-card.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .specter-code {
            font-size: 1.4rem;
            color: var(--green);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0,255,65,0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .w3w-box {
            margin: 12px 0;
            padding: 10px;
            background: rgba(255,215,0,0.08);
            border: 1px solid var(--gold);
            border-radius: 3px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease 0.1s;
        }
        
        .sector-card.visible .w3w-box.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .w3w-box.loading {
            opacity: 0.6;
            animation: loading-pulse 1.5s infinite;
        }
        
        @keyframes loading-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        
        .w3w-label {
            font-size: 0.6rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 4px;
        }
        
        .w3w-words {
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(255,215,0,0.4);
            letter-spacing: 1px;
        }
        
        .coords {
            color: var(--cyan);
            font-size: 0.85rem;
            margin: 12px 0;
            padding: 8px;
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .coords:hover, .coords:active {
            background: rgba(0,212,255,0.1);
            border-color: var(--cyan);
        }
        
        .meta {
            font-size: 0.7rem;
            color: var(--dim);
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(0,255,65,0.2);
            padding-top: 10px;
        }
        
        .w3w-status { color: var(--gold); }
        .w3w-status.offline { color: var(--dim); }
        
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        
        .btn {
            flex: 1;
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 10px;
            font-family: inherit;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-radius: 2px;
        }
        
        .btn:hover, .btn:active {
            background: var(--green);
            color: black;
            box-shadow: 0 0 15px rgba(0,255,65,0.4);
        }
        
        .btn.w3w {
            border-color: var(--gold);
            color: var(--gold);
            display: none;
        }
        
        .btn.w3w.visible { display: block; }
        .btn.w3w:hover, .btn.w3w:active {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 15px rgba(255,215,0,0.4);
        }
        
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.95);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 12px 24px;
            font-size: 0.8rem;
            z-index: 10000;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0,255,65,0.3);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        #gridCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        #gridCanvas.visible { opacity: 1; }
        
        .hint {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 10px 20px;
            font-size: 0.75rem;
            border-radius: 20px;
            pointer-events: none;
            opacity: 0.9;
            z-index: 100;
            white-space: nowrap;
        }
        
        .close-btn {
            position: absolute;
            top: -30px;
            right: 0;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--red);
            color: var(--red);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
        }
        
        .leaflet-control-attribution { display: none !important; }
        
        @media (max-width: 480px) {
            .sector-card { min-width: 280px; padding: 15px; }
            .specter-code { font-size: 1.1rem; }
            .w3w-words { font-size: 1rem; }
            .actions { flex-wrap: wrap; }
            .btn { padding: 8px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="scan-line"></div>
<div class="status-dot" id="statusDot"></div>

<div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('de', this)">DE</button>
    <button class="lang-btn" onclick="setLang('en', this)">EN</button>
    <button class="lang-btn" onclick="setLang('fr', this)">FR</button>
    <button class="lang-btn" onclick="setLang('es', this)">ES</button>
</div>

<div id="map"></div>
<canvas id="gridCanvas"></canvas>

<div class="sector-card" id="sectorCard">
    <div class="close-btn" onclick="closeCard()">×</div>
    <div class="specter-code" id="specterCode">ALPHA.TIGER.NORTH</div>
    
    <div class="w3w-box" id="w3wBox">
        <span class="w3w-label">what3words</span>
        <span class="w3w-words" id="w3wWords">///laden.von.api</span>
    </div>
    
    <div class="coords" id="coordsDisplay" onclick="copyCoords()">00.000000, 00.000000</div>
    
    <div class="meta">
        <span id="accuracy">ACC: ±44m</span>
        <span class="w3w-status" id="w3wStatus">SYNC...</span>
    </div>
    
    <div class="actions">
        <button class="btn" onclick="copySpecter()">COPY CODE</button>
        <button class="btn w3w" id="btnW3W" onclick="copyW3W()">COPY W3W</button>
        <button class="btn" onclick="openMaps()" style="border-color: var(--cyan); color: var(--cyan);">MAPS</button>
    </div>
</div>

<div class="toast" id="toast"></div>
<div class="hint">HALTEN für Sektor • ZOOM 19+ für Grid</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
// === KONFIGURATION ===
const CONFIG = {
    SECTOR_SIZE: 0.0004, // ca. 44m
    GRID_ZOOM: 19,
    LONG_PRESS: 600,
    W3W_KEY: 'BHT4P7WG', // EXPOSED - Nach Test zurücksetzen!
    DEFAULT_POS: [52.520008, 13.404954], // Berlin
    WORDS: {
        a: ['ALPHA','BRAVO','CHARLIE','DELTA','ECHO','FOXTROT','GOLF','HOTEL','INDIA','JULIET','KILO','LIMA'],
        b: ['TIGER','WOLF','VIPER','EAGLE','SHARK','RAVEN','FALCON','LION','BEAR','HAWK','JAGUAR','COBRA'],
        c: ['PRIME','CORE','BASE','POINT','ZONE','SECTOR','NODE','HUB','PORT','CENTER','NEXUS','ZERO']
    }
};

// === STATE ===
let state = {
    map: null,
    sector: null,
    w3w: null,
    lang: 'de',
    holding: false,
    timer: null,
    abortCtrl: null
};

// === INIT MAP ===
state.map = L.map('map', {
    zoomControl: false,
    attributionControl: false,
    center: CONFIG.DEFAULT_POS,
    zoom: 13,
    minZoom: 3,
    maxZoom: 22
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 22,
    opacity: 0.7,
    subdomains: 'abcd'
}).addTo(state.map);

// === GRID CANVAS ===
const canvas = document.getElementById('gridCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    const rect = document.getElementById('map').getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(dpr, dpr);
    drawGrid();
}

window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

function drawGrid() {
    const zoom = state.map.getZoom();
    if (zoom < CONFIG.GRID_ZOOM) {
        canvas.classList.remove('visible');
        return;
    }
    
    canvas.classList.add('visible');
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    
    const bounds = state.map.getBounds();
    const s = CONFIG.SECTOR_SIZE;
    const latStart = Math.floor(bounds.getSouth()/s)*s;
    const lngStart = Math.floor(bounds.getWest()/s)*s;
    
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.4)';
    ctx.lineWidth = 1;
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'rgba(0, 212, 255, 0.3)';
    
    ctx.beginPath();
    for (let lat = latStart; lat <= bounds.getNorth(); lat += s) {
        const p1 = state.map.latLngToContainerPoint([lat, bounds.getWest()]);
        const p2 = state.map.latLngToContainerPoint([lat, bounds.getEast()]);
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
    }
    for (let lng = lngStart; lng <= bounds.getEast(); lng += s) {
        const p1 = state.map.latLngToContainerPoint([bounds.getSouth(), lng]);
        const p2 = state.map.latLngToContainerPoint([bounds.getNorth(), lng]);
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
    }
    ctx.stroke();
}

state.map.on('move zoom', drawGrid);

// === SPECTER CODE GENERATOR ===
function genSpecter(lat, lng) {
    const normLat = ((lat % 90) + 90) % 90;
    const normLng = ((lng % 180) + 180) % 180;
    const hash = Math.abs(Math.floor((normLat * 10000) * (normLng * 10000) * 997)) % 10000;
    return `${CONFIG.WORDS.a[hash % 12]}.${CONFIG.WORDS.b[(hash >> 4) % 12]}.${CONFIG.WORDS.c[(hash >> 8) % 12]}`;
}

// === WHAT3WORDS API (DIREKT) ===
async function fetchW3W(lat, lng) {
    const box = document.getElementById('w3wBox');
    const wordsEl = document.getElementById('w3wWords');
    const statusEl = document.getElementById('w3wStatus');
    const btnW3W = document.getElementById('btnW3W');
    
    // Reset
    if (state.abortCtrl) state.abortCtrl.abort();
    state.abortCtrl = new AbortController();
    
    box.classList.add('visible', 'loading');
    btnW3W.classList.remove('visible');
    wordsEl.textContent = '///resolving...';
    statusEl.textContent = 'SYNC...';
    statusEl.classList.remove('offline');
    state.w3w = null;
    
    try {
        const url = `https://api.what3words.com/v3/convert-to-3wa?coordinates=${lat},${lng}&key=${CONFIG.W3W_KEY}&language=${state.lang}`;
        
        const response = await fetch(url, {
            signal: state.abortCtrl.signal,
            headers: { 'Accept': 'application/json' }
        });
        
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        
        if (data.words) {
            state.w3w = data.words;
            wordsEl.textContent = `///${data.words}`;
            statusEl.textContent = `W3W:${state.lang.toUpperCase()}`;
            btnW3W.classList.add('visible');
            box.classList.remove('loading');
            showToast('W3W RESOLVED');
        }
    } catch (err) {
        if (err.name === 'AbortError') return;
        
        console.warn('W3W Error:', err);
        wordsEl.textContent = '///unavailable';
        statusEl.textContent = 'OFFLINE';
        statusEl.classList.add('offline');
        box.classList.remove('loading');
        state.w3w = null;
    }
}

// === TOUCH HANDLING ===
const mapEl = document.getElementById('map');

function getPointerPos(e) {
    if (e.touches) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
}

function onStart(e) {
    if (state.map.getZoom() < CONFIG.GRID_ZOOM) {
        showToast('ZOOM 19+ REQUIRED');
        return;
    }
    
    state.holding = true;
    const pos = getPointerPos(e);
    state.startPos = pos;
    
    state.timer = setTimeout(() => {
        if (!state.holding) return;
        state.holding = false;
        
        const latlng = state.map.containerPointToLatLng(L.point(pos.x, pos.y));
        selectSector(latlng.lat, latlng.lng);
        
        if (navigator.vibrate) navigator.vibrate(50);
    }, CONFIG.LONG_PRESS);
}

function onMove(e) {
    if (!state.holding) return;
    const pos = getPointerPos(e);
    const dx = pos.x - state.startPos.x;
    const dy = pos.y - state.startPos.y;
    
    if (Math.sqrt(dx*dx + dy*dy) > 20) {
        cancelSelection();
    }
}

function onEnd() {
    cancelSelection();
}

function cancelSelection() {
    state.holding = false;
    clearTimeout(state.timer);
}

// Events
mapEl.addEventListener('touchstart', onStart, {passive: true});
mapEl.addEventListener('touchmove', onMove, {passive: true});
mapEl.addEventListener('touchend', onEnd);
mapEl.addEventListener('touchcancel', onEnd);

// Mouse Support
mapEl.addEventListener('mousedown', (e) => onStart(e));
mapEl.addEventListener('mousemove', (e) => onMove(e));
mapEl.addEventListener('mouseup', onEnd);

// === SEKTOR SELEKTION ===
function selectSector(lat, lng) {
    const s = CONFIG.SECTOR_SIZE;
    const latS = Math.floor(lat / s) * s;
    const lngS = Math.floor(lng / s) * s;
    
    state.sector = {
        lat: latS + s/2,
        lng: lngS + s/2,
        n: latS + s,
        s: latS,
        e: lngS + s,
        w: lngS
    };
    
    // UI Update
    document.getElementById('specterCode').textContent = genSpecter(state.sector.lat, state.sector.lng);
    document.getElementById('coordsDisplay').textContent = `${state.sector.lat.toFixed(6)}, ${state.sector.lng.toFixed(6)}`;
    document.getElementById('accuracy').textContent = `ACC: ±${Math.round(s * 111000)}m`;
    
    document.getElementById('sectorCard').classList.add('visible');
    
    // W3W laden
    fetchW3W(state.sector.lat, state.sector.lng);
}

function closeCard() {
    document.getElementById('sectorCard').classList.remove('visible');
    if (state.abortCtrl) state.abortCtrl.abort();
}

// === SPRACHE ===
function setLang(lang, btn) {
    state.lang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    if (state.sector && document.getElementById('sectorCard').classList.contains('visible')) {
        fetchW3W(state.sector.lat, state.sector.lng);
    }
    showToast(`LANG: ${lang.toUpperCase()}`);
}

// === ACTIONS ===
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function copySpecter() {
    if (!state.sector) return;
    const code = document.getElementById('specterCode').textContent;
    navigator.clipboard.writeText(code).then(() => showToast('SPECTER COPIED'));
}

function copyW3W() {
    if (!state.w3w) return;
    navigator.clipboard.writeText(`///${state.w3w}`).then(() => showToast('W3W COPIED'));
}

function copyCoords() {
    if (!state.sector) return;
    const coords = document.getElementById('coordsDisplay').textContent;
    navigator.clipboard.writeText(coords).then(() => showToast('COORDS COPIED'));
}

function openMaps() {
    if (!state.sector) return;
    const url = `https://www.google.com/maps?q=${state.sector.lat},${state.sector.lng}&z=20&t=k`;
    window.open(url, '_blank');
}

// === GPS LOCATE ===
document.getElementById('statusDot').addEventListener('click', () => {
    if (!navigator.geolocation) {
        showToast('GPS NOT AVAILABLE');
        return;
    }
    
    showToast('LOCATING...');
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            const { latitude, longitude } = pos.coords;
            state.map.setView([latitude, longitude], 18);
            selectSector(latitude, longitude);
            showToast('LOCATION FOUND');
        },
        (err) => showToast('GPS ERROR'),
        { enableHighAccuracy: true, timeout: 10000 }
    );
});

// Klick außerhalb = schließen
document.getElementById('map').addEventListener('click', (e) => {
    if (e.target.id === 'map') closeCard();
});
</script>
</body>
</html>
