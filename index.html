<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>OPERATION SPECTER | W3W Integration</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap');
        
        :root {
            --bg: #000000;
            --cyan: #00d4ff;
            --green: #00ff41;
            --gold: #ffeb99;
            --red: #ff0040;
            --dim: #5a6b7b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: white;
            overflow: hidden;
            touch-action: none;
        }
        
        #map { width: 100vw; height: 100vh; background: #020408; z-index: 1; }
        
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            opacity: 0.5; animation: scan 3s linear infinite; pointer-events: none; z-index: 10;
        }
        @keyframes scan { 0% { transform: translateY(-100vh); } 100% { transform: translateY(100vh); } }
        
        .sector-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0,0,0,0.95); border: 1px solid var(--green);
            padding: 20px; border-radius: 4px; min-width: 280px; text-align: center;
            opacity: 0; transition: all 0.3s; z-index: 100; pointer-events: auto;
            box-shadow: 0 0 30px rgba(0,255,65,0.3);
        }
        .sector-card.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        .specter-code {
            font-size: 1.3rem; color: var(--green); font-weight: 700;
            text-shadow: 0 0 10px var(--green); margin-bottom: 8px; letter-spacing: 1px;
        }
        
        .w3w-box {
            margin: 10px 0; padding: 8px; background: rgba(255,235,153,0.1);
            border: 1px solid var(--gold); border-radius: 3px; opacity: 0;
            transform: translateY(-5px); transition: all 0.3s;
        }
        .w3w-box.visible { opacity: 1; transform: translateY(0); }
        .w3w-box.loading { opacity: 0.6; }
        .w3w-label { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 4px; }
        .w3w-words { color: var(--gold); font-size: 1rem; text-shadow: 0 0 5px rgba(255,235,153,0.5); }
        
        .coords { color: var(--cyan); font-size: 0.85rem; margin: 8px 0; cursor: pointer; padding: 6px; border: 1px solid rgba(0,212,255,0.3); border-radius: 3px; }
        .coords:active { background: rgba(0,212,255,0.2); }
        
        .meta { font-size: 0.7rem; color: var(--dim); margin-top: 8px; display: flex; justify-content: space-between; border-top: 1px solid rgba(0,255,65,0.2); padding-top: 8px; }
        
        .actions { display: flex; gap: 8px; margin-top: 12px; }
        button {
            flex: 1; background: transparent; border: 1px solid var(--green); color: var(--green);
            padding: 8px; font-family: inherit; font-size: 0.7rem; cursor: pointer; text-transform: uppercase;
        }
        button:active { background: var(--green); color: black; }
        button.w3w-btn { border-color: var(--gold); color: var(--gold); display: none; }
        button.w3w-btn.visible { display: block; }
        
        .lang-bar {
            position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 5px;
        }
        .lang-btn {
            background: rgba(0,0,0,0.8); border: 1px solid var(--dim); color: var(--dim);
            padding: 5px 10px; font-family: inherit; font-size: 0.7rem; cursor: pointer;
        }
        .lang-btn.active { border-color: var(--gold); color: var(--gold); }
        
        .status-dot {
            position: fixed; top: 20px; right: 20px; width: 10px; height: 10px;
            background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green);
            z-index: 1000; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        
        .toast {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.95); border: 1px solid var(--green); color: var(--green);
            padding: 10px 20px; font-size: 0.8rem; opacity: 0; transition: opacity 0.3s; z-index: 10000;
        }
        .toast.show { opacity: 1; }
        
        #gridCanvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; }
        #gridCanvas.visible { opacity: 1; }
        
        .hint {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); border: 1px solid var(--cyan); color: var(--cyan);
            padding: 8px 16px; font-size: 0.7rem; border-radius: 20px; pointer-events: none; opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="scan-line"></div>
<div class="status-dot" id="statusDot"></div>
<div class="toast" id="toast"></div>

<div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('de')">DE</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
</div>

<div id="map"></div>
<canvas id="gridCanvas"></canvas>

<div class="sector-card" id="sectorCard">
    <div class="specter-code" id="specterCode">ALPHA.TIGER.NORTH</div>
    
    <div class="w3w-box" id="w3wBox">
        <span class="w3w-label">what3words</span>
        <span class="w3w-words" id="w3wWords">///laden.von.server</span>
    </div>
    
    <div class="coords" id="coordsDisplay" onclick="copyCoords()">0.000000, 0.000000</div>
    
    <div class="meta">
        <span id="accuracy">±44m</span>
        <span id="w3wStatus">SYNC...</span>
    </div>
    
    <div class="actions">
        <button onclick="copySpecter()">COPY</button>
        <button class="w3w-btn" id="btnCopyW3W" onclick="copyW3W()">COPY W3W</button>
        <button onclick="openMaps()">MAPS</button>
    </div>
</div>

<div class="hint">HOLD für Sektor • Sprache oben links wählen</div>

<script>
// Konfiguration
const CONFIG = {
    SECTOR_SIZE: 0.0004,
    GRID_ZOOM: 19,
    LONG_PRESS: 800,
    PROXY_URL: 'http://localhost:3000/api/sector-w3w', // Dein lokaler Server
    DEFAULT_POS: [52.520008, 13.404954] // Berlin
};

// State
let state = {
    map: null,
    sector: null,
    coords: null,
    w3w: null,
    lang: 'de',
    holding: false,
    timer: null
};

// Wortlisten für SPECTER-Codes
const WORDS = {
    a: ['ALPHA','BRAVO','CHARLIE','DELTA','ECHO','FOXTROT','GOLF','HOTEL','INDIA','JULIET','KILO','LIMA'],
    b: ['TIGER','WOLF','VIPER','EAGLE','SHARK','RAVEN','FALCON','LION','BEAR','HAWK','JAGUAR','COBRA'],
    c: ['PRIME','CORE','BASE','POINT','ZONE','SECTOR','NODE','HUB','PORT','CENTER','NEXUS','ZERO']
};

// Init Map
state.map = L.map('map', { zoomControl: false, attributionControl: false }).setView(CONFIG.DEFAULT_POS, 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 22, opacity: 0.7 }).addTo(state.map);

// Canvas für Grid
const canvas = document.getElementById('gridCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    const rect = document.getElementById('map').getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
    drawGrid();
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

function drawGrid() {
    if (state.map.getZoom() < CONFIG.GRID_ZOOM) {
        canvas.classList.remove('visible'); return;
    }
    canvas.classList.add('visible');
    const b = state.map.getBounds();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = 'rgba(0,212,255,0.3)'; ctx.lineWidth = 1;
    
    const s = CONFIG.SECTOR_SIZE;
    const latStart = Math.floor(b.getSouth()/s)*s;
    const lngStart = Math.floor(b.getWest()/s)*s;
    
    for(let lat=latStart; lat<=b.getNorth(); lat+=s) {
        const p1 = state.map.latLngToContainerPoint([lat,b.getWest()]);
        const p2 = state.map.latLngToContainerPoint([lat,b.getEast()]);
        ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    }
    for(let lng=lngStart; lng<=b.getEast(); lng+=s) {
        const p1 = state.map.latLngToContainerPoint([b.getSouth(),lng]);
        const p2 = state.map.latLngToContainerPoint([b.getNorth(),lng]);
        ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    }
}
state.map.on('move zoom', drawGrid);

// Generiere SPECTER-Code
function genSpecter(lat,lng) {
    const h = Math.abs(Math.floor((lat*10000)*(lng*10000)*997))%10000;
    return `${WORDS.a[h%12]}.${WORDS.b[(h>>4)%12]}.${WORDS.c[(h>>8)%12]}`;
}

// what3words Laden
async function loadW3W(lat, lng) {
    const box = document.getElementById('w3wBox');
    const words = document.getElementById('w3wWords');
    const status = document.getElementById('w3wStatus');
    const btn = document.getElementById('btnCopyW3W');
    
    box.classList.add('visible', 'loading');
    words.textContent = '///resolving...';
    status.textContent = 'SYNC...';
    btn.classList.remove('visible');
    state.w3w = null;
    
    try {
        const url = `${CONFIG.PROXY_URL}?lat=${lat}&lng=${lng}&lang=${state.lang}`;
        const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
        
        if (!res.ok) throw new Error('API Error');
        const data = await res.json();
        
        if (data.words) {
            state.w3w = data.words;
            words.textContent = `///${data.words}`;
            status.textContent = `W3W:${state.lang.toUpperCase()}`;
            status.style.color = 'var(--gold)';
            box.classList.remove('loading');
            btn.classList.add('visible');
            showToast('W3W RESOLVED');
        }
    } catch(e) {
        words.textContent = '///offline';
        status.textContent = 'OFFLINE';
        status.style.color = 'var(--dim)';
        box.classList.remove('loading');
    }
}

// Touch Handling
const mapEl = document.getElementById('map');

function onTouchStart(e) {
    if (state.map.getZoom() < CONFIG.GRID_ZOOM) return;
    state.holding = true;
    const t = e.touches[0];
    
    state.timer = setTimeout(() => {
        state.holding = false;
        const pt = state.map.containerPointToLatLng(L.point(t.clientX, t.clientY));
        selectSector(pt.lat, pt.lng);
        if(navigator.vibrate) navigator.vibrate(50);
    }, CONFIG.LONG_PRESS);
}

function onTouchMove(e) {
    if (!state.holding) return;
    // Abbruch bei zu großer Bewegung
    // (Vereinfacht für dieses Beispiel)
}

function onTouchEnd() {
    state.holding = false;
    clearTimeout(state.timer);
}

mapEl.addEventListener('touchstart', onTouchStart, {passive:true});
mapEl.addEventListener('touchmove', onTouchMove, {passive:true});
mapEl.addEventListener('touchend', onTouchEnd);
mapEl.addEventListener('touchcancel', onTouchEnd);

// Maus-Unterstützung
mapEl.addEventListener('mousedown', (e) => {
    onTouchStart({touches:[{clientX:e.clientX, clientY:e.clientY}]});
});
mapEl.addEventListener('mouseup', onTouchEnd);

// Sektor auswählen
function selectSector(lat, lng) {
    const s = CONFIG.SECTOR_SIZE;
    const latS = Math.floor(lat/s)*s;
    const lngS = Math.floor(lng/s)*s;
    
    state.sector = {
        n: latS+s, s: latS, e: lngS+s, w: lngS,
        cLat: latS+s/2, cLng: lngS+s/2
    };
    
    // UI Update
    const card = document.getElementById('sectorCard');
    document.getElementById('specterCode').textContent = genSpecter(state.sector.cLat, state.sector.cLng);
    document.getElementById('coordsDisplay').textContent = `${state.sector.cLat.toFixed(6)}, ${state.sector.cLng.toFixed(6)}`;
    
    card.classList.add('visible');
    
    // W3W laden
    loadW3W(state.sector.cLat, state.sector.cLng);
}

// Sprache wechseln
function setLang(l) {
    state.lang = l;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    
    if (state.sector) {
        loadW3W(state.sector.cLat, state.sector.cLng);
    }
    showToast(`LANGUAGE: ${l.toUpperCase()}`);
}

// Actions
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function copySpecter() {
    if (!state.sector) return;
    const text = document.getElementById('specterCode').textContent;
    navigator.clipboard.writeText(text).then(() => showToast('SPECTER COPIED'));
}

function copyW3W() {
    if (!state.w3w) return;
    navigator.clipboard.writeText(`///${state.w3w}`).then(() => showToast('W3W COPIED'));
}

function copyCoords() {
    if (!state.sector) return;
    navigator.clipboard.writeText(document.getElementById('coordsDisplay').textContent)
        .then(() => showToast('COORDS COPIED'));
}

function openMaps() {
    if (!state.sector) return;
    const url = `https://www.google.com/maps?q=${state.sector.cLat},${state.sector.cLng}&z=20&t=k`;
    window.open(url, '_blank');
}

// Karte anklicken = Card schließen
document.getElementById('sectorCard').addEventListener('click', (e) => e.stopPropagation());
document.getElementById('map').addEventListener('click', () => {
    document.getElementById('sectorCard').classList.remove('visible');
});
</script>
</body>
</html>
