<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OPERATION SPECTER | Precision Grid</title>
    <meta name="timestamp" content="2026-03-11T20:45:00Z">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-void: #000000;
            --bg-deep: #02060c;
            --bg-panel: rgba(4, 10, 18, 0.97);
            --cyan: #00d4ff;
            --cyan-dim: rgba(0, 212, 255, 0.18);
            --cyan-bright: rgba(0, 212, 255, 0.9);
            --matrix-green: #00ff41;
            --matrix-glow: rgba(0, 255, 65, 0.35);
            --matrix-dim: rgba(0, 255, 65, 0.5);
            --alert-red: #ff0040;
            --alert-dim: rgba(255, 0, 64, 0.15);
            --signal-white: #d8f0ff;
            --signal-mid: #8aa0b0;
            --signal-dim: #3d5060;
            --border-subtle: rgba(0, 212, 255, 0.08);
            --border-active: rgba(0, 212, 255, 0.25);
            --watermark-fade: rgba(0, 255, 65, 0.025);
            --location-blue: #0090ff;
            --location-glow: rgba(0, 144, 255, 0.55);
            --bar-height: 52px;
            --ctrl-height: 68px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-void);
            color: var(--signal-white);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-size: 14px;
            touch-action: none;
            overscroll-behavior: none;
        }

        /* Watermark */
        .watermark-container {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .watermark-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8vw; font-weight: 700;
            color: var(--watermark-fade);
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 2vw;
            transform: rotate(180deg);
        }
        .watermark-timestamp {
            position: fixed;
            bottom: calc(var(--ctrl-height) + 10px);
            right: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: var(--watermark-fade);
            transform: rotate(-90deg);
            transform-origin: right bottom;
            letter-spacing: 2px;
            z-index: 9999;
            pointer-events: none;
        }

        /* Scanner */
        .scanner-bg {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.12;
            background: linear-gradient(180deg, transparent 0%, rgba(0,212,255,0.04) 50%, transparent 100%);
            animation: scan 10s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        /* Toast */
        .toast {
            position: fixed;
            top: calc(var(--bar-height) + 10px);
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: var(--bg-panel);
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            padding: 10px 22px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            z-index: 10000;
            opacity: 0;
            transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            box-shadow: 0 4px 20px var(--matrix-glow);
            letter-spacing: 1px;
            max-width: 82%;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            border-color: var(--alert-red);
            color: var(--alert-red);
            box-shadow: 0 4px 20px rgba(255,0,64,0.3);
        }

        /* Command Interface */
        .command-interface {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-rows: var(--bar-height) 1fr var(--ctrl-height);
            height: 100vh;
            height: 100dvh;
        }

        /* Status Header */
        .status-header {
            grid-row: 1;
            background: linear-gradient(180deg, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.6) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-family: 'JetBrains Mono', monospace;
            z-index: 100;
            padding-top: env(safe-area-inset-top, 0px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 90px;
        }

        .pulse-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--matrix-green);
            box-shadow: 0 0 8px var(--matrix-green), 0 0 14px rgba(0,255,65,0.3);
            animation: heartbeat 2.4s ease-in-out infinite;
            flex-shrink: 0;
        }
        .pulse-dot.gm-mode { background: var(--alert-red); box-shadow: 0 0 8px var(--alert-red); }
        .pulse-dot.locating { background: var(--location-blue); box-shadow: 0 0 8px var(--location-blue); animation: pulse-blue 1.4s infinite; }

        @keyframes heartbeat { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.75)} }
        @keyframes pulse-blue { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.25)} }
        @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.45} }

        .header-title {
            color: var(--matrix-green);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 12px var(--matrix-glow);
        }
        .header-title.gm-mode {
            color: var(--alert-red);
            text-shadow: 0 0 12px rgba(255,0,64,0.5);
            animation: pulse-red 2s infinite;
        }

        .header-center {
            flex: 1;
            text-align: center;
        }
        .grid-status {
            font-size: 0.65rem;
            color: var(--signal-dim);
            opacity: 0;
            transition: opacity 0.4s;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .grid-status.active { opacity: 1; color: var(--matrix-dim); text-shadow: 0 0 8px var(--matrix-glow); }
        .grid-status.surface { opacity: 1; color: var(--cyan); }
        .grid-status.gm-active { opacity: 1; color: var(--alert-red); text-shadow: 0 0 8px rgba(255,0,64,0.4); animation: pulse-red 2s infinite; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 90px;
            justify-content: flex-end;
        }
        .zoom-badge {
            font-size: 0.68rem;
            color: var(--signal-mid);
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.04);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
            transition: color 0.3s, border-color 0.3s;
        }
        .zoom-badge.zoomed {
            color: var(--cyan);
            border-color: var(--border-active);
        }

        /* Map Zone */
        .map-zone {
            grid-row: 2;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
            touch-action: pan-x pan-y pinch-zoom;
        }
        #map {
            width: 100%; height: 100%;
            background: var(--bg-deep);
            z-index: 5;
        }
        #gridCanvas {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.35s cubic-bezier(0.4,0,0.2,1);
            will-change: opacity;
        }
        #gridCanvas.visible { opacity: 1; }

        /* Hold Indicator – leicht nach unten versetzt, damit kein Überlapp mit Label */
        .hold-indicator {
            position: absolute;
            width: 56px; height: 56px;
            pointer-events: none;
            z-index: 30;
            transform: translate(-50%, -30%);
            display: none;
        }
        .hold-indicator.active { display: block; }
        .hold-indicator svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .hold-indicator circle { fill: none; stroke-width: 3; }
        .hold-indicator .bg { stroke: rgba(0, 212, 255, 0.15); }
        .hold-indicator .progress {
            stroke: var(--matrix-green);
            stroke-linecap: round;
            stroke-dasharray: 145;
            stroke-dashoffset: 145;
            transition: stroke-dashoffset 0.08s linear;
            filter: drop-shadow(0 0 5px var(--matrix-green));
        }
        .hold-indicator .crosshair {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .hold-indicator .crosshair::before,
        .hold-indicator .crosshair::after {
            content: '';
            position: absolute;
            background: var(--cyan);
            opacity: 0.6;
        }
        .hold-indicator .crosshair::before { width: 12px; height: 1px; }
        .hold-indicator .crosshair::after { width: 1px; height: 12px; }

        /* Sector Selector */
        .sector-selector {
            position: absolute;
            border: 1.5px solid var(--cyan);
            background: rgba(0, 212, 255, 0.06);
            pointer-events: none;
            z-index: 16;
            display: none;
            box-shadow: 0 0 16px rgba(0,212,255,0.12), inset 0 0 8px rgba(0,212,255,0.03);
            transition: all 0.3s ease;
        }
        .sector-selector.active { display: block; animation: pulse-select 2.2s infinite; }
        .sector-selector.hold-mode { border-color: var(--matrix-green); background: rgba(0,255,65,0.08); animation: none; }
        .sector-selector.gm-active-sector { border-color: var(--alert-red); background: rgba(255,0,64,0.07); animation: pulse-red-border 1.5s infinite; }
        @keyframes pulse-select { 0%,100%{border-color:var(--cyan);background:rgba(0,212,255,0.06)} 50%{border-color:var(--matrix-green);background:rgba(0,255,65,0.08)} }
        @keyframes pulse-red-border { 0%,100%{box-shadow:0 0 8px rgba(255,0,64,0.3)} 50%{box-shadow:0 0 18px rgba(255,0,64,0.55)} }

        /* Sector Label Temp – höher versetzt, damit Hold-Indikator nicht überlappt */
        .sector-label-temp {
            position: absolute;
            pointer-events: none;
            z-index: 25;
            background: var(--bg-panel);
            border: 1px solid var(--matrix-green);
            padding: 12px 18px;
            border-radius: 6px;
            box-shadow: 0 0 28px var(--matrix-glow), inset 0 0 16px rgba(0,255,65,0.04);
            transform: translate(-50%, -200%) scale(0.92);
            opacity: 0;
            transition: all 0.18s ease-out;
            text-align: center;
            min-width: 220px;
            backdrop-filter: blur(12px);
        }
        .sector-label-temp.visible {
            opacity: 1;
            transform: translate(-50%, -215%) scale(1);
        }
        .sector-label-temp .words {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem; font-weight: 700;
            color: var(--matrix-green); letter-spacing: 2px;
            text-shadow: 0 0 10px var(--matrix-green);
        }
        .sector-label-temp .coords {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: var(--cyan);
            margin-top: 6px;
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border: 1px solid var(--cyan-dim);
            border-radius: 4px;
            background: rgba(0,212,255,0.08);
            transition: background 0.2s;
        }
        .sector-label-temp .coords:active { background: var(--cyan-dim); }
        .sector-label-temp .coords svg { width: 10px; height: 10px; opacity: 0.7; }
        .sector-label-temp .hint {
            font-size: 0.58rem; color: var(--signal-dim); margin-top: 7px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.8px;
        }

        /* Sector Label Permanent */
        .sector-label {
            position: absolute;
            pointer-events: auto;
            z-index: 20;
            background: var(--bg-panel);
            border: 1px solid var(--matrix-green);
            padding: 16px 18px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 28px var(--matrix-glow);
            transform: translate(-50%, -50%) scale(0.88);
            opacity: 0;
            transition: all 0.28s cubic-bezier(0.34, 1.28, 0.64, 1);
            text-align: center;
            min-width: 250px;
            backdrop-filter: blur(14px);
        }
        .sector-label.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .sector-label .label-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .sector-label .label-icon {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--matrix-green);
            box-shadow: 0 0 6px var(--matrix-green);
            animation: heartbeat 2s infinite;
        }
        .sector-label .words {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem; font-weight: 700;
            color: var(--matrix-green); letter-spacing: 2.5px;
            text-shadow: 0 0 10px var(--matrix-green);
        }
        .sector-label .coords-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem; color: var(--cyan);
            margin: 10px 0;
            padding: 8px 10px;
            border: 1px solid var(--cyan-dim);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0,212,255,0.05);
            position: relative;
        }
        .sector-label .coords-display::before {
            content: 'IN GM ÖFFNEN';
            display: block;
            font-size: 0.58rem; color: var(--signal-mid);
            margin-bottom: 3px; letter-spacing: 1.5px;
        }
        .sector-label .coords-display:hover,
        .sector-label .coords-display:active {
            background: var(--cyan-dim);
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0,212,255,0.15);
        }
        .sector-label .meta {
            font-size: 0.65rem; color: var(--signal-dim);
            font-family: 'JetBrains Mono', monospace;
            border-top: 1px solid rgba(0,255,65,0.12);
            padding-top: 8px; margin-top: 8px;
            display: flex; justify-content: space-between;
            letter-spacing: 0.5px;
        }
        .sector-label .meta span { display: flex; align-items: center; gap: 4px; }
        .sector-label .meta span::before {
            content: '';
            display: inline-block;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--signal-dim);
        }
        .sector-label .actions {
            margin-top: 12px;
            display: flex;
            gap: 7px;
            justify-content: center;
        }
        .btn-action {
            background: rgba(0,255,65,0.07);
            border: 1px solid rgba(0,255,65,0.3);
            color: var(--matrix-dim);
            padding: 6px 13px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem; font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.18s;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex; align-items: center; gap: 4px;
        }
        .btn-action svg { width: 10px; height: 10px; }
        .btn-action:hover, .btn-action:active {
            background: var(--matrix-green);
            color: #000;
            border-color: var(--matrix-green);
            box-shadow: 0 0 12px var(--matrix-glow);
        }
        .btn-action.danger {
            border-color: rgba(255,0,64,0.3);
            color: var(--alert-red);
            background: var(--alert-dim);
        }
        .btn-action.danger:hover, .btn-action.danger:active {
            background: var(--alert-red);
            color: #fff;
            border-color: var(--alert-red);
            box-shadow: 0 0 12px rgba(255,0,64,0.4);
        }
        .sector-label .close-btn {
            position: absolute;
            top: 8px; right: 8px;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--signal-dim);
            font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1;
        }
        .sector-label .close-btn:hover { background: rgba(255,0,64,0.15); border-color: var(--alert-red); color: var(--alert-red); }

        /* GM Overlay */
        .gm-sector-overlay {
            position: absolute;
            border: 1.5px solid var(--alert-red);
            background: rgba(0,0,0,0.96);
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255,0,64,0.25);
            transition: none;
        }
        .gm-sector-overlay iframe { width:100%;height:100%;border:none;opacity:0;transition:opacity 0.45s ease; }
        .gm-sector-overlay.loaded iframe { opacity:1; }
        .gm-sector-overlay .gm-error { display:none; position:absolute; top:50%;left:50%; transform:translate(-50%,-50%); color:var(--alert-red); font-family:'JetBrains Mono',monospace; font-size:0.78rem; text-align:center; padding:20px; }
        .gm-sector-overlay.error iframe { display:none; }
        .gm-sector-overlay.error .gm-error { display:block; }
        .gm-close-btn {
            position:absolute; top:6px; right:6px;
            background:rgba(0,0,0,0.9); border:1px solid var(--alert-red);
            color:var(--alert-red); width:28px; height:28px;
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-family:'JetBrains Mono',monospace; font-size:1rem;
            cursor:pointer; z-index:101; box-shadow:0 2px 8px rgba(0,0,0,0.8);
        }
        .gm-loading { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%); color:var(--alert-red); font-family:'JetBrains Mono',monospace; font-size:0.75rem; z-index:99; pointer-events:none; }
        .gm-external-btn { position:absolute;bottom:10px;left:50%;transform:translateX(-50%); background:rgba(255,0,64,0.15);border:1px solid var(--alert-red); color:var(--alert-red); padding:5px 12px; font-family:'JetBrains Mono',monospace; font-size:0.68rem; cursor:pointer; z-index:101; border-radius:4px; text-decoration:none; }

        /* Touch Guide */
        .touch-guide {
            position: absolute;
            bottom: 16px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.88);
            border: 1px solid var(--border-active);
            padding: 10px 18px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: var(--cyan);
            opacity: 0; pointer-events: none;
            transition: opacity 0.35s; z-index: 50;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 16px rgba(0,212,255,0.1);
            letter-spacing: 0.5px;
        }
        .touch-guide.visible { opacity: 1; }

        /* Control Bar */
        .control-bar {
            grid-row: 3;
            background: linear-gradient(0deg, rgba(0,0,0,0.99) 0%, rgba(0,0,0,0.85) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 8px 8px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
            z-index: 100;
        }

        .control-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--signal-dim);
            padding: 7px 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: all 0.22s;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 52px;
            position: relative;
        }
        .control-btn.disabled {
            opacity: 0.35;
            pointer-events: none;
        }
        .control-btn svg {
            width: 18px; height: 18px;
            transition: all 0.22s;
        }
        .control-btn:active:not(.disabled) { transform: scale(0.92); }
        .control-btn.active {
            color: var(--cyan);
            border-color: var(--border-active);
            background: rgba(0,212,255,0.07);
        }
        .control-btn.active svg { filter: drop-shadow(0 0 4px var(--cyan)); }
        .control-btn:hover:not(.disabled) {
            color: var(--signal-white);
            border-color: rgba(255,255,255,0.08);
        }
        .control-btn.locate-active {
            color: var(--location-blue);
            border-color: rgba(0,144,255,0.3);
            background: rgba(0,144,255,0.08);
        }
        .control-btn.locate-active svg { filter: drop-shadow(0 0 4px var(--location-blue)); }
        .control-btn.gm-btn-active {
            color: var(--alert-red);
            border-color: rgba(255,0,64,0.3);
            background: var(--alert-dim);
        }

        /* Event Button */
        .btn-toggle-events {
            position: fixed;
            top: calc(var(--bar-height) + 10px);
            right: 12px;
            z-index: 150;
            background: var(--bg-panel);
            border: 1px solid var(--border-active);
            color: var(--cyan);
            padding: 7px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            cursor: pointer;
            border-radius: 6px;
            backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
            letter-spacing: 0.5px;
        }
        .btn-toggle-events svg { width: 13px; height: 13px; }
        .btn-toggle-events:active { transform: scale(0.95); }
        .btn-toggle-events.has-events {
            border-color: rgba(0,255,65,0.3);
            color: var(--matrix-green);
        }
        .btn-toggle-events.active {
            background: rgba(0,212,255,0.15);
            border-color: var(--cyan);
        }
        .event-badge {
            background: var(--matrix-green);
            color: #000;
            font-size: 0.55rem;
            font-weight: 700;
            width: 16px; height: 16px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            display: none;
        }
        .event-badge.visible { display: flex; }

        /* Event Sidebar / Modal / Marker – unverändert (keine Überlappungsprobleme) */
        .event-sidebar, .event-modal, .event-marker, .location-dot { /* ... (CSS unverändert) */ }
        /* (Der Rest der Event-CSS bleibt exakt gleich – nur verkürzt dargestellt) */
        .event-sidebar { position: fixed; top: var(--bar-height); right: -320px; width: 300px; height: calc(100dvh - var(--bar-height) - var(--ctrl-height)); background: var(--bg-panel); border-left: 1px solid var(--border-active); z-index: 200; transition: right 0.3s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; padding: 16px; box-shadow: -8px 0 32px rgba(0,0,0,0.6); }
        .event-sidebar.active { right: 0; }
        /* ... restliche Event-CSS (Sidebar, Modal, Marker) bleibt 1:1 wie im Original ... */

        /* Leaflet Overrides */
        .leaflet-container { background: var(--bg-deep) !important; }
        .leaflet-control-attribution { display: none !important; }
        .leaflet-popup-content-wrapper {
            background: var(--bg-panel) !important;
            border: 1px solid var(--border-active) !important;
            border-radius: 6px !important;
            box-shadow: 0 8px 24px rgba(0,0,0,0.7) !important;
            color: var(--signal-white) !important;
        }
        .leaflet-popup-tip { background: var(--bg-panel) !important; }

        /* Responsive */
        @media (max-width: 380px) {
            .command-interface { grid-template-rows: 44px 1fr 62px; }
            .control-btn { min-width: 44px; font-size: 0.55rem; padding: 5px 7px; }
            .control-btn svg { width: 16px; height: 16px; }
            .sector-label, .sector-label-temp { min-width: 190px; padding: 10px 14px; }
            .sector-label .words { font-size: 0.95rem; }
            .event-sidebar { width: 100%; right: -100%; top: 44px; }
        }
        @media (min-width: 600px) {
            .event-form { border-radius: 12px; margin-bottom: 0; }
            .event-modal { align-items: center; padding: 20px; }
        }
    </style>
</head>
<body>

<!-- Onboarding, Watermark, Scanner, Toast, Events-UI – unverändert -->
<div class="onboarding" id="onboarding"> ... </div>
<div class="watermark-container"><div class="watermark-text"> </div></div>
<div class="watermark-timestamp">2026-03-11T20:45:00Z</div>
<div class="scanner-bg"></div>
<div class="toast" id="toast">KOORDINATEN KOPIERT</div>

<button class="btn-toggle-events" id="btnToggleEvents"> ... </button>
<div class="event-sidebar" id="eventSidebar"> ... </div>
<div class="event-modal" id="eventModal"> ... </div>

<!-- Main Interface -->
<div class="command-interface">

    <header class="status-header"> ... </header>

    <main class="map-zone" id="mapZone">
        <div id="map"></div>
        <canvas id="gridCanvas"></canvas>

        <div id="holdIndicator" class="hold-indicator"> ... </div>
        <div id="sectorSelector" class="sector-selector"></div>

        <!-- Temp Label -->
        <div id="sectorLabelTemp" class="sector-label-temp"> ... </div>

        <!-- Permanent Label -->
        <div id="sectorLabel" class="sector-label"> ... </div>

        <div class="touch-guide" id="touchGuide"> ... </div>
    </main>

    <nav class="control-bar"> ... </nav>
</div>

<script>
// ===================== CONFIG =====================
const CONFIG = {
    SECTOR_SIZE: 0.0004,
    GRID_ZOOM: 18,
    SURFACE_MAX_ZOOM: 17,
    LONG_PRESS_DURATION: 580,
    DOUBLE_TAP_DELAY: 280,
    DEFAULT_CENTER: [6.0329, 80.2168],
    DEFAULT_ZOOM: 13,
    GM_MIN_ZOOM: 19,
    GM_MIN_SIZE_PX: 100,
    MAX_GRID_LINES: 100,
    STORAGE_KEY: 'specter_events_v2',
    ONBOARDING_KEY: 'specter_onboarded_v3',
    HOLD_MOVE_TOLERANCE: 25   // NEU: höhere Toleranz gegen versehentliches Abbrechen
};

// ===================== STATE =====================
let state = {
    isGridActive: false,
    selectedSector: null, 
    currentWords: '', 
    currentCoords: null,
    touchStartTime: 0, 
    touchStartPos: { x: 0, y: 0 },
    longPressTimer: null, 
    isLongPress: false, 
    isHolding: false,
    lastTapTime: 0, 
    gmActive: false, 
    gmSector: null, 
    gmOverlay: null,
    resizeTimeout: null, 
    events: [], 
    tempEventCoords: null,
    locationMarker: null, 
    isLocating: false,
    touchGuideTimer: null,
    viewMode: 'surface'
};

// ===================== MAP & LAYER =====================
const satLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 22, opacity: 0.9 });
const map = L.map('map', {
    zoomControl: false, attributionControl: false,
    center: CONFIG.DEFAULT_CENTER, zoom: CONFIG.DEFAULT_ZOOM,
    minZoom: 3, maxZoom: 22,
    doubleClickZoom: false,
    bounceAtZoomLimits: false,
    preferCanvas: true,
    touchZoom: true,
    scrollWheelZoom: true
});
satLayer.addTo(map);

// ===================== VIEW MODE =====================
function updateViewMode() {
    const zoom = map.getZoom();
    const statusEl = document.getElementById('gridStatus');
    const canvas = document.getElementById('gridCanvas');
    
    if (state.gmActive) {
        statusEl.className = 'grid-status gm-active';
        statusEl.textContent = '⚠ GM-MODUS AKTIV';
        canvas.classList.remove('visible');
        return;
    }
    
    if (zoom >= CONFIG.GRID_ZOOM) {
        state.viewMode = 'grid';
        state.isGridActive = true;
        statusEl.className = 'grid-status active';
        statusEl.textContent = 'SEKTOR-GRID AKTIV';
        canvas.classList.add('visible');
        drawGrid();
    } else {
        state.viewMode = 'surface';
        state.isGridActive = false;
        statusEl.className = 'grid-status surface';
        statusEl.textContent = 'SURFACE VIEW';
        canvas.classList.remove('visible');
    }
}

// ===================== GM MODE – OPTIMIERTE VERSION =====================
function openInGM(lat, lng) {
    if (map.getZoom() < CONFIG.GM_MIN_ZOOM) {
        map.setView([lat, lng], CONFIG.GM_MIN_ZOOM);
        setTimeout(() => openInGM(lat, lng), 600);
        return;
    }

    // === OPTIMIERUNG: Label & Hold ausblenden (vermeidet Überlappung) ===
    hideSectorPermanent();
    hideSectorTemp();
    cancelHold();

    // === OPTIMIERUNG: Karte komplett sperren (kein Pan/Zoom/Hold mehr) ===
    map.dragging.disable();
    map.touchZoom.disable();
    map.scrollWheelZoom.disable();
    map.doubleClickZoom.disable();
    map.keyboard.disable();

    const bounds = getSectorBounds(lat, lng);
    const sw = map.latLngToContainerPoint([bounds.south, bounds.west]);
    const ne = map.latLngToContainerPoint([bounds.north, bounds.east]);
    const x = Math.min(sw.x, ne.x), y = Math.min(sw.y, ne.y);
    const w = Math.max(Math.abs(ne.x - sw.x), CONFIG.GM_MIN_SIZE_PX);
    const h = Math.max(Math.abs(ne.y - sw.y), CONFIG.GM_MIN_SIZE_PX);
    
    if (state.gmOverlay) state.gmOverlay.remove();
    
    const overlay = document.createElement('div');
    overlay.className = 'gm-sector-overlay';
    overlay.style.cssText = `left:\( {x}px;top: \){y}px;width:\( {w}px;height: \){h}px;`;
    
    const url = `https://maps.google.com/maps?q=\( {bounds.centerLat}, \){bounds.centerLng}&z=19&output=embed`;
    overlay.innerHTML = `
        <button class="gm-close-btn" title="Schließen">✕</button>
        <div class="gm-loading">GOOGLE MAPS LADEN…</div>
        <iframe src="${url}" title="Google Maps" onload="this.parentElement.classList.add('loaded')" onerror="this.parentElement.classList.add('error')"></iframe>
        <div class="gm-error">GM NICHT VERFÜGBAR<br><br><a href="https://maps.google.com/maps?q=\( {bounds.centerLat}, \){bounds.centerLng}" target="_blank" class="gm-external-btn">EXTERN ÖFFNEN</a></div>`;
    
    document.getElementById('mapZone').appendChild(overlay);
    state.gmOverlay = overlay; 
    state.gmActive = true; 
    state.gmSector = bounds;
    
    overlay.querySelector('.gm-close-btn').addEventListener('click', closeGM);
    
    // UI-Feedback
    document.getElementById('pulseDot').classList.add('gm-mode');
    document.getElementById('headerTitle').className = 'header-title gm-mode';
    document.getElementById('headerTitle').textContent = 'GM-MODUS';
    document.getElementById('sectorSelector').classList.add('gm-active-sector');
    updateViewMode();
}

function closeGM() {
    if (state.gmOverlay) { state.gmOverlay.remove(); state.gmOverlay = null; }
    
    // === OPTIMIERUNG: Karte wieder freigeben ===
    map.dragging.enable();
    map.touchZoom.enable();
    map.scrollWheelZoom.enable();
    map.doubleClickZoom.disable(); // bleibt deaktiviert für Doppel-Tap
    map.keyboard.enable();
    
    state.gmActive = false; 
    state.gmSector = null;
    
    document.getElementById('pulseDot').className = 'pulse-dot';
    document.getElementById('headerTitle').className = 'header-title';
    document.getElementById('headerTitle').textContent = 'SPECTER';
    document.getElementById('sectorSelector').classList.remove('gm-active-sector');
    updateViewMode();
}

// ===================== TOUCH/MOUSE – OPTIMIERTE SKIP-LOGIK =====================
const mapZone = document.getElementById('mapZone');

function getEventCoords(e) {
    const touch = e.touches ? e.touches[0] : e;
    const rect = mapZone.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function screenToLatLng(x, y) {
    return map.containerPointToLatLng([x, y]);
}

// NEU: zentrale Skip-Funktion (verhindert Störungen durch GM, Label, Modal)
function shouldSkipInteraction(e) {
    return state.gmActive || 
           e.target.closest('.sector-label') || 
           e.target.closest('.gm-sector-overlay') || 
           e.target.closest('.event-modal');
}

// Touch
mapZone.addEventListener('touchstart', e => {
    if (shouldSkipInteraction(e)) return;
    
    const { x, y } = getEventCoords(e);
    state.touchStartTime = Date.now();
    state.touchStartPos = { x, y };
    state.isLongPress = false;
    
    const now = Date.now();
    if (now - state.lastTapTime < CONFIG.DOUBLE_TAP_DELAY) {
        state.lastTapTime = 0;
        const latlng = screenToLatLng(x, y);
        openEventModal(latlng.lat, latlng.lng);
        return;
    }
    state.lastTapTime = now;
    startHold(x, y);
}, { passive: true });

mapZone.addEventListener('touchend', e => {
    const wasLongPress = state.isLongPress;
    cancelHold();
    if (wasLongPress && state.currentCoords) {
        showSectorPermanent(state.currentCoords.lat, state.currentCoords.lng);
    }
}, { passive: true });

mapZone.addEventListener('touchmove', e => {
    if (!state.isHolding) return;
    const { x, y } = getEventCoords(e);
    const dx = x - state.touchStartPos.x, dy = y - state.touchStartPos.y;
    if (Math.sqrt(dx*dx + dy*dy) > CONFIG.HOLD_MOVE_TOLERANCE) cancelHold();
}, { passive: true });

// Maus (Desktop)
mapZone.addEventListener('mousedown', e => {
    if (shouldSkipInteraction(e)) return;
    // ... identische Logik wie touchstart (Double-Tap + startHold)
    const { x, y } = getEventCoords(e);
    state.touchStartTime = Date.now();
    state.touchStartPos = { x, y };
    state.isLongPress = false;
    
    const now = Date.now();
    if (now - state.lastTapTime < CONFIG.DOUBLE_TAP_DELAY) {
        state.lastTapTime = 0;
        const latlng = screenToLatLng(x, y);
        openEventModal(latlng.lat, latlng.lng);
        return;
    }
    state.lastTapTime = now;
    startHold(x, y);
});

mapZone.addEventListener('mouseup', e => {
    const wasLongPress = state.isLongPress;
    cancelHold();
    if (wasLongPress && state.currentCoords) {
        showSectorPermanent(state.currentCoords.lat, state.currentCoords.lng);
    }
});

mapZone.addEventListener('mousemove', e => {
    if (!state.isHolding) return;
    const { x, y } = getEventCoords(e);
    const dx = x - state.touchStartPos.x, dy = y - state.touchStartPos.y;
    if (Math.sqrt(dx*dx + dy*dy) > CONFIG.HOLD_MOVE_TOLERANCE) cancelHold();
});

// ===================== CONTROL-BAR – BLOCKIERUNG IM GM-MODUS =====================
document.getElementById('btnReset').addEventListener('click', () => {
    if (state.gmActive) {
        showToast('GM-MODUS AKTIV – zuerst schließen', true);
        return;
    }
    map.setView(CONFIG.DEFAULT_CENTER, CONFIG.DEFAULT_ZOOM);
    hideSectorPermanent(); 
    hideSectorTemp(); 
    cancelHold();
    if (state.gmActive) closeGM();
    showToast('ANSICHT ZURÜCKGESETZT');
});

document.getElementById('btnZoomIn').addEventListener('click', () => {
    if (state.gmActive) {
        showToast('GM-MODUS AKTIV – zuerst schließen', true);
        return;
    }
    map.zoomIn();
});

document.getElementById('btnZoomOut').addEventListener('click', () => {
    if (state.gmActive) {
        showToast('GM-MODUS AKTIV – zuerst schließen', true);
        return;
    }
    map.zoomOut();
});

document.getElementById('btnLocate').addEventListener('click', () => {
    if (state.gmActive) {
        showToast('GM-MODUS AKTIV – zuerst schließen', true);
        return;
    }
    // ... restliche Locate-Logik (unverändert)
});

document.getElementById('btnClear').addEventListener('click', () => {
    hideSectorPermanent(); 
    hideSectorTemp();
    if (state.gmActive) closeGM();
    document.getElementById('sectorSelector').className = 'sector-selector';
    showToast('AUSWAHL GELÖSCHT');
});

// ===================== REST (Events, Grid, Helpers, Onboarding etc.) =====================
// (Alle übrigen Funktionen – loadEvents, renderEventMarkers, drawGrid, generateWords, 
//  showSectorTemp/Permanent, startHold, showToast etc. – bleiben 1:1 wie im Original)

loadEvents();
renderEventMarkers();
updateViewMode();

window.addEventListener('resize', () => {
    clearTimeout(state.resizeTimeout);
    state.resizeTimeout = setTimeout(() => {
        drawGrid();
        if (state.gmActive && state.gmOverlay && state.gmSector) {
            const sw = map.latLngToContainerPoint([state.gmSector.south, state.gmSector.west]);
            const ne = map.latLngToContainerPoint([state.gmSector.north, state.gmSector.east]);
            const w = Math.max(Math.abs(ne.x-sw.x), CONFIG.GM_MIN_SIZE_PX);
            const h = Math.max(Math.abs(ne.y-sw.y), CONFIG.GM_MIN_SIZE_PX);
            state.gmOverlay.style.cssText = `left:\( {Math.min(sw.x,ne.x)}px;top: \){Math.min(sw.y,ne.y)}px;width:\( {w}px;height: \){h}px;`;
        }
    }, 150);
});
</script>
</body>
</html>
